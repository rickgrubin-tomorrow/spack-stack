spack:
  concretizer:
    unify: when_possible

  view: false
  include:
  - site
  - common
  definitions:
  - compilers:
    - '%oneapi'
    #- '%intel'
  - packages:
    - base-env

  specs:
  - matrix:
    - [$packages]
    - [$compilers]
  packages:
    all:
      prefer: ['%oneapi']
      #prefer: ['%intel']
