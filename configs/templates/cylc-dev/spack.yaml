# Template for CYLC (flow, rose, GUI). Supported with GCC only.
# Creates a view that allows users to define (manually for now)
# simple environments with just PATH and CYLC_PYTHONPATH set:
#
# #!/bin/bash
# export VIEWDIR=/path/to/env/view-pys
# export PATH=$VIEWDIR/bin:$PATH
# export CYLC_PYTHONPATH=$VIEWDIR/lib/python3.11/site-packages
#
spack:
  concretizer:
    unify: true

  view:
    cylc:
      root: $SPACK_ENV/view-pys
      select: [^python]
      link: run
      link_type: symlink
  include: []

  definitions:
  - compilers: ['%gcc']
  - packages: 
    - py-cylc-flow
    - py-cylc-rose
    - py-cylc-uiserver
    # below is from JCSDA/spack-stack PR 1410
    #   configs/templates/cylc-dev/spack.yaml
    # see also for potential changes for cython versions
    #- py-cylc-flow@8.3.6
    #- py-cylc-rose@1.4.2
    #- py-cylc-uiserver@1.5.1

  specs:
  - matrix:
    - [$packages]
    - [$compilers]
