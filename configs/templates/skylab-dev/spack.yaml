spack:
  concretizer:
    unify: when_possible

  view: false
  include: []

  definitions:
  - compilers: ['%aocc', '%apple-clang', '%gcc', '%intel', '%oneapi']
  - packages:
    - ewok-env +ecflow ~cylc
    - ai-env
    - geos-gcm-env          ^esmf@=8.6.1
    - jedi-fv3-env
    - jedi-geos-env         ^esmf@=8.6.1
    - jedi-mpas-env
    - jedi-neptune-env      ^esmf@=8.9.0b12
    - jedi-tools-env
    - jedi-ufs-env          ^esmf@=8.8.0
    - jedi-um-env
    - neptune-env           ^esmf@=8.9.0b12
    - neptune-python-env    ^esmf@=8.9.0b12
    - soca-env

    # Various crtm tags (list all to avoid duplicate packages)
    - crtm@2.4.0.1
    - crtm@v2.4.1-jedi.2
    - crtm@3.1.2

    # Mapl with various esmf tags
    - mapl@2.53.0 ^esmf@8.6.1
    - mapl@2.53.4 ^esmf@8.8.0

    # Various esmf tags (list all to avoid duplicate packages)
    - esmf@=8.6.1 snapshot=none
    - esmf@=8.8.0 snapshot=none
    - esmf@=8.9.0b12 snapshot=b12

  specs:
  - matrix:
    - [$packages]
    - [$compilers]
    exclude:

    # Exclude Intel and OneAPI variants
    - jedi-tools-env%intel
    - jedi-tools-env%oneapi
    
    # py-torch in ai-env doesn't build with Intel
    - ai-env%intel
    - ai-env%oneapi

    # Skip incompatible CRTM versions with oneapi
    - crtm@2.4.0.1%oneapi

  packages:
    # Avoid duplicate builds of parallelio +pnetcdf and ~pnetcdf
    parallelio:
      require:
      - '+pnetcdf'
