compilers::
- compiler: # Custom installed.
    spec: gcc@11.2.1
    paths:
      cc: /opt/rh/gcc-toolset-11/root/usr/bin/gcc
      cxx: /opt/rh/gcc-toolset-11/root/usr/bin/g++
      f77: /opt/rh/gcc-toolset-11/root/usr/bin/gfortran
      fc: /opt/rh/gcc-toolset-11/root/usr/bin/gfortran
    flags: {}
    operating_system: almalinux8
    target: x86_64
    modules: []
    environment: {}
    extra_rpaths:
    - /opt/rh/gcc-toolset-11/root/lib
    - /opt/rh/gcc-toolset-11/root/lib64
- compiler: # Do not use. gcc9 versions are inconsistent across AlmaLinux images
    spec: gcc@9.2.1
