      fc: /opt/rh/gcc-toolset-9/root/bin/gfortran
    flags: {}
    operating_system: almalinux8
    target: x86_64
    modules: []
    environment: {}
    extra_rpaths:
    - /opt/rh/gcc-toolset-9/root/lib
    - /opt/rh/gcc-toolset-9/root/lib64
- compiler: # Do not use. gcc9 versions are inconsistent across AlmaLinux images
