packages:
  # Modification of common packages
  # Use system zlib instead of spack-built zlib-ng
  all:
    providers:
      zlib-api:: [zlib]
  zlib-api:
    buildable: False
  zlib:
    buildable: False
    externals:
    - spec: zlib@1.2.13
      prefix: /usr

# All other packages listed alphabetically
  autoconf:
