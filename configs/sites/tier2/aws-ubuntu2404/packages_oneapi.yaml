packages:
  all:
    compiler:: [oneapi@2024.2.1, gcc@13.3.0]
    providers:
      mpi:: [intel-oneapi-mpi@2021.13]
      # Remove the next three lines to switch to intel-oneapi-mkl
      blas:: [openblas]
      fftw-api:: [fftw]
      lapack:: [openblas]
  intel-oneapi-runtime:
    buildable: False
    externals:
    - spec: intel-oneapi-runtime@2024.2.1%oneapi@2024.2.1
      prefix: /opt/intel/oneapi
  intel-oneapi-mpi:
    buildable: False
  intel-oneapi-mkl:
    buildable: False
    externals:
    - spec: intel-oneapi-mpi@2021.13%oneapi@2024.2.1
      prefix: /opt/intel/oneapi
  ectrans:
    require::
    - '@1.5.0 ~mkl +fftw'
  gsibec:
    require::
    - '@1.2.1 ~mkl'
  py-numpy:
    require::
    - '@:1.26.4 ^openblas'
  gmake:
    buildable: False