packages:
  all:
    compiler:: [oneapi@2024.2.1, oneapi@2025.1.0, gcc@11.4.1]
    providers:
      mpi:: [intel-oneapi-mpi@2021.13, intel-oneapi-mpi@2021.15]
  mpi:
    buildable: False
  intel-oneapi-mpi:
    externals:
    - spec: intel-oneapi-mpi@2021.13%oneapi@2024.2.1
      prefix: /opt/intel/oneapi
    - spec: intel-oneapi-mpi@2021.15%oneapi@2025.1.0
      prefix: /opt/intel/oneapi
  intel-oneapi-mkl:
    externals:
    - spec: intel-oneapi-mkl@2024.2%oneapi@2024.2.1
      prefix: /opt/intel/oneapi
    - spec: intel-oneapi-mkl@2025.1%oneapi@2025.1.0
      prefix: /opt/intel/oneapi
  intel-oneapi-runtime:
    externals:
    - spec: intel-oneapi-runtime@2024.2.1%oneapi@2024.2.1
      prefix: /opt/intel/oneapi
    - spec: intel-oneapi-runtime@2025.1.0%oneapi@2025.1.0
      prefix: /opt/intel/oneapi
