packages:
  all:
    compiler:: [oneapi@2024.2.1, gcc@12.3.0]
    providers:
      mpi:: [intel-oneapi-mpi@2021.13]
      blas:: [openblas]
      fftw-api:: [fftw]
      lapack:: [openblas]
  mpi:
    buildable: False
  intel-oneapi-mpi:
    buildable: False
    externals:
    - spec: intel-oneapi-mpi@2021.13%oneapi@2024.2.1
      modules:
      - mpi/2021.13
      prefix: /opt/intel/oneapi
  intel-oneapi-mkl:
    externals:
    - spec: intel-oneapi-mkl@2024.2.1%oneapi@2024.2.1
      modules:
      - mkl/2024.2
      prefix: /opt/intel/oneapi
  intel-oneapi-runtime:
    externals:
    - spec: intel-oneapi-runtime@2024.2.1%oneapi@2024.2.1
      prefix: /opt/intel/oneapi
      modules:
      - compiler-rt/2024.2.1
  gcc-runtime:
    externals:
    - spec: gcc-runtime@12.3.0%gcc@12.3.0
      prefix: /usr 
