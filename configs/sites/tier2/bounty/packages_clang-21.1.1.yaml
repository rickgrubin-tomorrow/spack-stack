packages:
  mpi:
    require:
    - "openmpi@=5.0.8"
  llvm:
    buildable: False
    externals:
    - spec: llvm@21.1.1 +flang ~libomptarget
      prefix: /home/dom/prod/llvm-21.1.1
      extra_attributes:
        compilers:
          c: /home/dom/prod/llvm-21.1.1/bin/clang
          cxx: /home/dom/prod/llvm-21.1.1/bin/clang++
          fortran: /home/dom/prod/llvm-21.1.1/bin/flang-new
        extra_rpaths:
        - /home/dom/prod/llvm-21.1.1/lib
        - /home/dom/prod/llvm-21.1.1/lib/x86_64-unknown-linux-gnu
