packages:
    #
    ### Set compiler. 
    # 
    all: 
      compiler:: [intel@19.1.3.304]
    #
    ### External packages.
    # 
    cray-mpich:
      externals:
      - spec: cray-mpich@8.1.9~wrappers
        modules:
        - libfabric
        - craype-network-ofi
        - cray-mpich/8.1.9
    #
    ### Set GCC version.
    #
    gcc-runtime:
      require: ['%gcc@10.2.0']
    #
    ### Package settings.
    #
    harfbuzz:
      require: ['%gcc']
    ecflow:
      require:: ['@5.11.4', '+ui', '^boost %gcc', '%intel']
