packages:
    #
    ### Set compilers & MPI provider for metamodule generation. 
    # 
    all: 
      compiler:: [intel@19.1.3.304]
      providers:
        mpi:: [cray-mpich]
    #
    ### External packages.
    # 
    cray-mpich:
      externals:
      - spec: cray-mpich@8.1.9~wrappers
        modules:
        - libfabric
        - craype-network-ofi
        - cray-mpich/8.1.9
    #
    ### Set GCC version.
    #
    gcc-runtime:
      require: ['%gcc@10.2.0']
    #
    ### Package settings.
    #
    harfbuzz:
      require: ['%gcc']
    ecflow:
      require::
      - '@5.11.4'
      - '+ui'
      - 'cflags="-no-ipo" cxxflags="-no-ipo"'
      - '^boost %gcc'
      - '%intel'
    py-numpy::
      require::
      - '^[virtuals=lapack,blas] openblas'
      - '@1.26'
      - '%gcc'
