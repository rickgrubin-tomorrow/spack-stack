packages:
  all:
    compiler:: [intel@2021.10.0]
    providers:
      mpi:: [intel-oneapi-mpi@2021.9.0]
      # Remove the next three lines to switch to intel-oneapi-mkl
      blas:: [openblas]
      fftw-api:: [fftw]
      lapack:: [openblas]
  mpi:
    buildable: False
  intel-oneapi-mpi:
    buildable: False
    externals:
    - spec: intel-oneapi-mpi@2021.9.0%intel@2021.10.0 +classic-names
      modules:
      - impi/2021.9.0
      prefix: /opt/intel/oneapi
  intel-oneapi-mkl:
    # Remove buildable: False and uncomment externals section below to use intel-oneapi-mkl
    buildable: False
    externals:
    - spec: intel-oneapi-mkl@2023.1.0.2%intel@2021.10.0
      prefix: /opt/intel/oneapi
  #intel-oneapi-runtime:
  #  externals:
  # - spec: intel-oneapi-runtime@203.1.0%intel@2023.1.0
  #   prefix: /opt/intel/oneapi/compiler/2023.1.0
  #   modules: []

  bazel:
    require: '%gcc'
  ectrans:
    require::
      - '@1.2.0 ~mkl +fftw'
  gdal:
    require:
      - '%gcc'
  gsibec:
    require::
      - '@1.2.1 ~mkl'
  py-numpy:
    require::
    - '@1.26:6'
    - '^openblas'
  #py-scipy:
  #  require: '%gcc'
  #py-torch:
  #  require:
  #    - '%gcc'
  #py-torchvision:
  #  require:
  #    - '%gcc'
  zlib-ng:
    require:
      - '~shared'
