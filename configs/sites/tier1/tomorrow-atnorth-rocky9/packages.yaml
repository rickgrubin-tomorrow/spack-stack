packages:
  # Modification of common packages
  all:
    # To support hecflow01
    target: [haswell]
    # Use system zlib instead of spack-built zlib-ng
    providers:
      zlib-api:: [zlib]
  zlib-api:
    buildable: False
  zlib:
    buildable: False
    externals:
    - spec: zlib@1.2.11
      prefix: /usr

