packages:
  all:
    compiler:: [oneapi@2024.2.1, oneapi@2025.0.4, gcc@13.3.0]
    providers:
      mpi:: [cray-mpich@8.1.30]
  mpi:
    buildable: False
  cray-mpich:
    externals:
    - spec: cray-mpich@8.1.30%oneapi@2024.2.1 ~wrappers
      modules:
      - cray-mpich/8.1.30
      - craype-network-ofi
    - spec: cray-mpich@8.1.30%oneapi@2025.0.4 +wrappers
      modules:
      - cray-mpich/8.1.30
      - craype-network-ofi
  intel-oneapi-mkl:
    externals:
    - spec: intel-oneapi-mkl@2024.2%oneapi@2024.2.1
      prefix: /p/app/intel/oneapi-combined
    - spec: intel-oneapi-mkl@2025.0%oneapi@2025.0.4
      prefix: /p/app/intel/oneapi-combined
  intel-oneapi-tbb:
    externals:
    - spec: intel-oneapi-tbb@2021.13%oneapi@2024.2.1
      prefix: /p/app/intel/oneapi-combined
    - spec: intel-oneapi-tbb@2022.0%oneapi@2025.0.4
      prefix: /p/app/intel/oneapi-combined
  intel-oneapi-runtime:
    externals:
    - spec: intel-oneapi-runtime@2024.2.1%oneapi@2024.2.1
      prefix: /p/app/intel/oneapi-combined
    - spec: intel-oneapi-runtime@2025.0.4%oneapi@2025.0.4
      prefix: /p/app/intel/oneapi-combined
