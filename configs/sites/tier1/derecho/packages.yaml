packages:
# Modification of common packages
  all:
    target: [core2]
    # Use system zlib instead of spack-built zlib-ng
    providers:
      zlib-api:: [zlib]
  zlib-api:
    buildable: False
  zlib:
    buildable: False
    externals:
    - spec: zlib@1.2.11
      prefix: /usr
  # Tell esmf that this is not a 'normal' Cray ...
  esmf:
    require:
    - 'esmf_os=Linux esmf_comm=mpich'

### All other external packages listed alphabetically
  autoconf:
    externals:
    - spec: autoconf@2.69
      prefix: /usr
  automake:
    externals:
    - spec: automake@1.15.1
      prefix: /usr
  binutils:
