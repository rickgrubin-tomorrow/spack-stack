        LD_LIBRARY_PATH: '/glade/u/apps/common/23.08/spack/opt/spack/intel-oneapi-compilers/2024.2.1/compiler/2024.2/lib'
      set:
        # https://github.com/JCSDA/spack-stack/issues/957
        FI_CXI_RX_MATCH_MODE: 'hybrid'
