packages:
  all:
    compiler:: [gcc@12.2.0]
    providers:
      mpi:: [cray-mpich@8.1.26]
  mpi:
    buildable: False
  cray-mpich:
    externals:
    - spec: cray-mpich@8.1.26%gcc@12.2.0 ~wrappers
      modules:
      - cray-mpich-ucx/8.1.26
      - craype-network-ucx
  # Require node-js earlier than 21 to prevent compile
  # errors with Cray GNU compiler 12.2.0
  node-js:
    require:
      - '@:20'
  # Turn off valgrind variant for py-torch because
  # of linker issues with Cray GNU compiler 12.2.0
  py-torch:
    require:
    - '~valgrind'
