packages:
  all:
    compiler:: [gcc@12.3.0]
    providers:
      mpi:: [cray-mpich@8.1.32]
  mpi:
    buildable: False
  cray-mpich:
    externals:
    - spec: cray-mpich@8.1.32
      prefix: /opt/cray/pe/mpich/8.1.32/ofi/gnu/12.3
      modules:
      - craype-network-ofi
      - cray-mpich/8.1.32
  gcc-runtime:
    externals:
    - spec: gcc-runtime@12.3.0%gcc@12.3.0
      prefix: /usr
